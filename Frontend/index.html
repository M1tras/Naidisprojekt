<!DOCTYPE html>
<html>
<head>
  <title>Energy Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>Energy Dashboard</h1>

<p id="status">Loading...</p>

<script>
fetch("http://localhost:3000/api/health")
  .then(res => res.json())
  .then(data => {
    document.getElementById("status").innerText =
      data.status === "ok" ? "Backend OK" : "Backend error";
  })
  .catch(() => {
    document.getElementById("status").innerText = "Cannot connect";
  });
</script>

<hr>

<!-- SYNC -->
<h2>Sync Electricity Prices</h2>

Start: <input type="datetime-local" id="start"><br><br>
End: <input type="datetime-local" id="end"><br><br>

Location:
<select id="location">
  <option value="EE">EE</option>
  <option value="LV">LV</option>
  <option value="FI">FI</option>
</select><br><br>

<button id="syncBtn">Sync Prices</button>
<p id="syncStatus"></p>

<hr>

<!-- DASHBOARD -->
<h2>Dashboard</h2>

<button id="loadBtn">Load Dashboard Data</button>

<canvas id="c1"></canvas>
<canvas id="c2"></canvas>
<canvas id="c3"></canvas>
<canvas id="c4"></canvas>

<p id="dashStatus"></p>

<script>
let charts = {};

// SYNC
document.getElementById("syncBtn").onclick = async () => {
  const res = await fetch("http://localhost:3000/api/sync/prices", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      start: document.getElementById("start").value,
      end: document.getElementById("end").value,
      location: document.getElementById("location").value
    })
  });

  const data = await res.json();
  document.getElementById("syncStatus").innerText =
    res.ok ? "OK sync" : data.error;
};


// DASHBOARD LOAD
document.getElementById("loadBtn").onclick = async () => {

  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;
  const location = document.getElementById("location").value;

  const res = await fetch(
    `http://localhost:3000/api/readings?start=${start}&end=${end}&location=${location}`
  );

  const data = await res.json();

  if (!data || data.length === 0) {
    document.getElementById("dashStatus").innerText = "No data found";
    return;
  }

  document.getElementById("dashStatus").innerText = "Loaded";

  // 1 LINE
  new Chart(c1, {
    type: "line",
    data: {
      labels: data.map(d => new Date(d.timestamp).toLocaleString()),
      datasets: [{ label: "Price", data: data.map(d => d.price_eur_mwh) }]
    }
  });

  // 2 DAILY AVG
  const days = {};
  data.forEach(d => {
    const day = new Date(d.timestamp).toISOString().split("T")[0];
    days[day] = days[day] || [];
    days[day].push(d.price_eur_mwh);
  });

  const daily = Object.entries(days).map(([k,v]) => ({
    k,
    avg: v.reduce((a,b)=>a+b)/v.length
  }));

  new Chart(c2, {
    type: "bar",
    data: {
      labels: daily.map(x=>x.k),
      datasets: [{ label:"Daily avg", data: daily.map(x=>x.avg) }]
    }
  });

  // 3 AVG BY LOCATION
  const loc = {};
  data.forEach(d => {
    loc[d.location] = loc[d.location] || [];
    loc[d.location].push(d.price_eur_mwh);
  });

  const locAvg = Object.entries(loc).map(([k,v])=>({
    k,
    avg: v.reduce((a,b)=>a+b)/v.length
  }));

  new Chart(c3, {
    type: "bar",
    data: {
      labels: locAvg.map(x=>x.k),
      datasets: [{ label:"Avg", data: locAvg.map(x=>x.avg) }]
    }
  });

  // 4 COMPARE (simple)
  const groups = {EE:[],LV:[],FI:[]};

  data.forEach(d => groups[d.location]?.push(d));

  new Chart(c4, {
    type: "line",
    data: {
      labels: groups.EE.map(x=>new Date(x.timestamp).toLocaleTimeString()),
      datasets: [
        {label:"EE", data: groups.EE.map(x=>x.price_eur_mwh)},
        {label:"LV", data: groups.LV.map(x=>x.price_eur_mwh)},
        {label:"FI", data: groups.FI.map(x=>x.price_eur_mwh)}
      ]
    }
  });
};
</script>

</body>
</html>
